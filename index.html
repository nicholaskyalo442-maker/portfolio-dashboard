<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard | Nicholas Kyalo</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- PROFILE -->
  <div class="card profile">
    <img src="assets/profile.jpg" alt="Profile">

    <h1>Nicholas Kyalo</h1>
    <p>Actuarial Science Student | Risk Analyst | Data Enthusiast</p>

    <div class="links">
      <a href="cv.pdf" download>Download CV</a>
      <a href="https://github.com/">GitHub</a>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="card">
      <h2 id="projectsCount">0</h2>
      <p>Projects</p>
    </div>

    <div class="card">
      <h2 id="skillsCount">0</h2>
      <p>Skills</p>
    </div>

    <div class="card">
      <h2>1</h2>
      <p>Portfolio</p>
    </div>
  </div>

  <!-- PROJECTS -->
  <div class="card">
    <h3>Projects</h3>
    <ul>
      <li>Insurance Risk Model</li>
      <li>Financial Data Analysis</li>
      <li>Monte Carlo Simulation</li>
    </ul>
  </div>

  <!-- SKILLS -->
  <div class="card">
    <h3>Skills</h3>
    <ul>
      <li>Excel</li>
      <li>Python</li>
      <li>R Programming</li>
      <li>Risk Modeling</li>
    </ul>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
